name: "Add/Modify: Arrangement"
description: Add or modify an arrangement in WCRP Universe
title: "Add/Modify: Arrangement"
labels: ['alpha', 'arrangement', 'universe', 'Review', 'keep-open']
body:
  - type: markdown
    attributes:
      value: |
        ## Add/Modify: Arrangement
        
        Grid staggering arrangement (e.g. Arakawa grids).

  - type: input
    id: validation_key
    attributes:
      label: Validation Key
      description: Unique identifier (lowercase with hyphens)
      placeholder: "e.g. arakawa-c"
    validations:
      required: true

  - type: input
    id: ui_label
    attributes:
      label: UI Label
      description: Display name
      placeholder: "e.g. Arakawa C-grid"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the arrangement

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue Kind
      description: New or modify existing
      options:
        - "Modify"
        - "New"
      default: 0
    validations:
      required: true

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "e.g. user1"
