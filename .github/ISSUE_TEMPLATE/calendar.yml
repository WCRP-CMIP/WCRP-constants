name: "Add/Modify: Calendar"
description: Add or modify a calendar in WCRP Universe
title: "Add/Modify: Calendar"
labels: ['cmip-calendar']
body:
  - type: markdown
    attributes:
      value: |
        # Add/Modify: Calendar

  - type: input
    id: validation_key
    attributes:
      label: Validation Key
      description: Unique identifier (lowercase, hyphens only)
      placeholder: e.g. gregorian
    validations:
      required: true

  - type: input
    id: ui_label
    attributes:
      label: UI Label
      description: Human-readable display name
      placeholder: e.g. Gregorian
    validations:
      required: false

  - type: input
    id: description
    attributes:
      label: Description
      placeholder: Brief description
    validations:
      required: false

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue Kind
      options:
        - New
        - Modify
    validations:
      required: true

  - type: input
    id: additional_collaborators
    attributes:
      label: Additional Collaborators
      placeholder: GitHub usernames, comma-separated
    validations:
      required: false
