name: "Add/Modify: Native Vertical Grid Coordinate"
description: Add or modify a native vertical grid coordinate in WCRP Universe
title: "Add/Modify: Native Vertical Grid Coordinate"
labels: ['native_vertical_grid_coordinate']
body:
  - type: markdown
    attributes:
      value: |
        # Add/Modify: Native Vertical Grid Coordinate

  - type: input
    id: validation_key
    attributes:
      label: Validation Key
      description: Unique identifier
      placeholder: "e.g. pressure"
    validations:
      required: true

  - type: input
    id: ui_label
    attributes:
      label: UI Label
      description: Full name
      placeholder: "e.g. Pressure"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue Kind
      description: New or modify existing
      options:
        - "Modify"
        - "New"
      default: 0
    validations:
      required: true

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "e.g. user1"
