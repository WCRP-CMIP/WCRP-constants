name: ⇈ Update Issue Templates
description: Generate issue templates from CSV/Python definitions

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - '.github/GEN_ISSUE_TEMPLATE/**'
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update_templates:
    runs-on: ubuntu-latest
    steps:
      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate templates
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Starting LDR server..."
          ldr server stop 2>/dev/null || true
          ldr server start

          echo "Waiting for LDR server on port 3333..."
          for i in $(seq 1 30); do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/3333' 2>/dev/null; then
              echo "✅ LDR server ready (attempt $i)"
              break
            fi
            sleep 1
          done

          if ! timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/3333' 2>/dev/null; then
            echo "ERROR: LDR server did not start within 30s"
            exit 1
          fi

          echo "Running template generator..."
          template_generate

          echo "Updating modification links..."
          template_update || echo "template_update not available"

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/'
          author_name: 'cmip-ipo'
          author_email: 'actions@wcrp-cmip.org'
          message: 'Auto-update issue templates'
          push: true
